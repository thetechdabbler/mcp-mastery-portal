name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install D2
        run: |
          set -eux
          D2_VERSION=v0.7.1
          curl -fsSL -o /tmp/d2.tgz "https://github.com/terrastruct/d2/releases/download/${D2_VERSION}/d2-${D2_VERSION}-linux-amd64.tar.gz"
          tar -xzf /tmp/d2.tgz -C /tmp
          sudo install -m 0755 "/tmp/d2-${D2_VERSION}/bin/d2" /usr/local/bin/d2
          d2 version
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Tests
        run: npm test
      - name: Content check
        run: npm run content:check
      - name: Build
        run: npm run build
